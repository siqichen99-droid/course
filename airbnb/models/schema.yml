models:
  - name: dim_listings_cleansed
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
            severity: error
    columns:
    - name: listing_id
      data_tests:
        - not_null
        - unique
    - name: host_id
      data_tests:
        - not_null
        - relationships:
            arguments:
              to: ref('dim_hosts_cleansed')
              field: host_id
    - name: room_type
      data_tests:
        - accepted_values:
            arguments:
            values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']
    - name: minimum_nights
      data_tests:
        - positive_values


  - name: dim_hosts_cleansed
    config:
      contract:
        enforced: true
    columns:
    - name: host_id
      data_type: integer
      data_tests:
        - not_null
        - unique
    - name: host_name
      data_type: string
      data_tests:
        - not_null 
    - name: is_superhost
      data_type: string
      data_tests:
        - accepted_values:
            arguments:
              values: ['t', 'f']
    - name: updated_at
      data_type: timestamp
    - name: created_at
      data_type: timestamp
    
  - name: fct_reviews
    columns:
        - name: listing_id
          data_tests:
            - relationships:
                arguments:
                  to: ref('dim_listings_cleansed')
                  field: listing_id

        - name: reviewer_name
          data_tests:
            - not_null

        - name: review_sentiment
          data_tests:
            - accepted_values:
                arguments:
                  values: ['positive', 'neutral', 'negative']